name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        # E501 (line too long) excluded on purpose -- this codebase deliberately uses long
        # lines for detailed rationale comments, not a style bug.
        run: ruff check . --select E,F,B --ignore E501

  unit-tests:
    name: Unit tests (pytest, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/

  test:
    name: Functional tests (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install external tools (exiftool/ffmpeg/7zip/unrar)
        run: choco install exiftool ffmpeg 7zip unrar -y --no-progress
        shell: pwsh

      - name: Sanity-check tools are on PATH
        shell: pwsh
        run: |
          exiftool -ver
          ffmpeg -version | Select-Object -First 1
          ffprobe -version | Select-Object -First 1
          7z i | Select-Object -First 1

      - name: Syntax check
        run: python -m py_compile photosort_win.py

      - name: Run functional smoke tests
        run: python ci/windows_ci_test.py

  build:
    name: Build PhotoArchive.exe
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install external tools (exiftool/ffmpeg/7zip/unrar)
        run: choco install exiftool ffmpeg 7zip unrar -y --no-progress
        shell: pwsh

      - name: Assemble bin/ from choco-installed tools
        shell: pwsh
        run: ./ci/assemble_bin.ps1

      - name: Build PhotoArchive.exe
        shell: cmd
        working-directory: build
        run: build.bat

      - name: Smoke-test the built exe end-to-end
        shell: pwsh
        run: |
          $env:Path = "$PWD\bin;" + $env:Path
          python ci/smoke_test_exe.py

      # continue-on-error: this repo's Actions storage isn't the tight private-repo quota
      # that made the private repo's equivalent step defensive about it (see dev-repo
      # SESSION-HANDOFF.txt) -- kept anyway so a storage hiccup here can't fail a build that
      # otherwise passed every real check above.
      - uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: PhotoArchive-exe
          path: build/dist/PhotoArchive.exe
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PhotoArchive-exe
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PhotoArchive.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
