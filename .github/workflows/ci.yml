name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        # E501 (line too long) excluded on purpose -- this codebase deliberately uses long
        # lines for detailed rationale comments, not a style bug.
        run: ruff check . --select E,F,B --ignore E501

  unit-tests:
    name: Unit tests (pytest, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/

  test:
    name: Functional tests (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install external tools (exiftool/ffmpeg/7zip/unrar)
        run: choco install exiftool ffmpeg 7zip unrar -y --no-progress
        shell: pwsh

      - name: Sanity-check tools are on PATH
        shell: pwsh
        run: |
          exiftool -ver
          ffmpeg -version | Select-Object -First 1
          ffprobe -version | Select-Object -First 1
          7z i | Select-Object -First 1

      - name: Syntax check
        run: python -m py_compile photosort_win.py

      - name: Run functional smoke tests
        run: python ci/windows_ci_test.py

  build:
    name: Build PhotoArchive.exe
    runs-on: windows-latest
    needs: [lint, unit-tests, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install external tools (exiftool/ffmpeg/7zip/unrar)
        run: choco install exiftool ffmpeg 7zip unrar -y --no-progress
        shell: pwsh

      - name: Assemble bin/ from choco-installed tools
        shell: pwsh
        run: ./ci/assemble_bin.ps1

      - name: Build PhotoArchive.exe
        shell: cmd
        working-directory: build
        run: build.bat

      - name: Smoke-test the built exe end-to-end
        shell: pwsh
        run: |
          $env:Path = "$PWD\bin;" + $env:Path
          python ci/smoke_test_exe.py

      # No continue-on-error here (third-review finding, 2026-07-17): the release job below
      # downloads this exact artifact on a tag push -- a silently swallowed upload failure
      # would make `build` go green while `release` fails two jobs later on a confusing
      # "artifact not found", instead of failing loudly where the actual problem is. This
      # repo also doesn't have the private repo's tight artifact-storage quota that originally
      # motivated tolerating upload failures, so there's no real hiccup left to protect against.
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoArchive-exe
          path: build/dist/PhotoArchive.exe
          retention-days: 14

      # ZIP-ассет (папка PhotoArchive\ внутри: exe + документация PDF + лицензии + пример
      # конфига, build.bat собирает его сам) -- та же логика "не глотать ошибку загрузки
      # молча", что и у exe-артефакта выше: release job ниже качает оба по имени, тихий сбой
      # здесь всплыл бы там непонятной ошибкой "artifact not found".
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoArchive-zip
          path: build/dist/PhotoArchive.zip
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PhotoArchive-exe
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: PhotoArchive-zip
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PhotoArchive.exe
            dist/PhotoArchive.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
